# docker-compose override — Nemotron-3-Nano on L40S
#
# Extends docker-compose.yml: replaces the vLLM command with Nemotron-specific
# flags (reasoning parser plugin, tool-call parser).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.nemotron.yml up -d
#
# Prerequisites:
#   1. Set VLLM_MODEL in .env to a non-NVFP4 checkpoint, e.g.:
#        VLLM_MODEL=nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B
#      The NVFP4 checkpoint is Blackwell-exclusive and will NOT load on L40S.
#      Verify available checkpoints at https://huggingface.co/nvidia
#
#   2. Download the reasoning parser plugin once:
#        mkdir -p ./vllm_plugins
#        wget -O ./vllm_plugins/nano_v3_reasoning_parser.py \
#          https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4/resolve/main/nano_v3_reasoning_parser.py

services:
  vllm:
    volumes:
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
      - ./vllm_plugins:/vllm_plugins:ro
    command:
      - "vllm"
      - "serve"
      - "${VLLM_MODEL:-nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.85}"
      - "--max-num-seqs"
      - "${VLLM_MAX_NUM_SEQS:-32}"
      - "--kv-cache-dtype"
      - "${VLLM_KV_CACHE_DTYPE:-fp8}"
      - "--trust-remote-code"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "${VLLM_TOOL_CALL_PARSER:-qwen3_coder}"
      - "--reasoning-parser-plugin"
      - "/vllm_plugins/nano_v3_reasoning_parser.py"
      - "--reasoning-parser"
      - "nano_v3"
