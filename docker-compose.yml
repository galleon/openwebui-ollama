# Docker Compose — Ollama + Open WebUI + Docling
# Target: NVIDIA DGX Spark (GB10 / Blackwell sm_121)
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed (nvidia-ctk runtime configure --runtime=docker)
#   - Docker Engine with NVIDIA runtime set as default, OR use `runtime: nvidia` below
#
# Quick start:
#   cp .env.example .env          # adjust as needed
#   docker compose build docling  # build GB10-compatible docling image
#   docker compose up -d

services:

  # ─── Ollama ──────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      # Blackwell tuning — keep Flash Attention enabled (default in recent ollama)
      - OLLAMA_FLASH_ATTENTION=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Open WebUI ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # Ollama backend
      - OLLAMA_BASE_URL=http://ollama:11434

      # Docling as the document extraction engine
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001

      # Auth — set to false only for local/trusted networks
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-replace-this}

      # RAG / embedding
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-ollama}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nomic-embed-text}

      # Optional: enable GPU-accelerated reranker
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-false}

      # Vector store — default: chroma (built-in, no extra service needed)
      # Set VECTOR_DB=qdrant and start with: docker compose --profile qdrant up -d
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - QDRANT_URI=${QDRANT_URI:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_PREFER_GRPC=${QDRANT_PREFER_GRPC:-false}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT_TIMEOUT=${QDRANT_TIMEOUT:-}

      # vLLM OpenAI-compatible backend (optional)
      # Activate with: docker compose --profile vllm up -d
      # Open WebUI will list vLLM models alongside Ollama models automatically.
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}
    depends_on:
      ollama:
        condition: service_healthy
      docling:
        condition: service_healthy

  # ─── Docling ─────────────────────────────────────────────────────────────────
  # Uses a custom image built on the NVIDIA NGC PyTorch 26.01 base which ships
  # CUDA 13.1 — required for GB10 Blackwell (sm_121).
  # If you want to try the upstream image first (may fail on GB10):
  #   image: quay.io/docling-project/docling-serve-cu128:latest
  docling:
    build:
      context: .
      dockerfile: Dockerfile.docling
    image: docling-serve-gb10:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "${DOCLING_PORT:-5001}:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
      # All PDFs treated as image-based — OCR every page regardless of text layer
      - DOCLING_SERVE_PIPELINE_OPTIONS__DO_OCR=true
      # Increase for large/complex documents
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
      # workers=1 is enforced via CLI flag in Dockerfile CMD (not this env var)
      # Thread tuning for GB10 (Grace CPU has many cores — adjust to taste)
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-8}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-8}
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=${DOCLING_WORKERS:-2}
    # NGC PyTorch recommends ipc=host and raised ulimits to avoid SHMEM issues
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ─── vLLM (optional OpenAI-compatible inference server) ─────────────────────
  # Activate with:  docker compose --profile vllm up -d
  #
  # vLLM exposes an OpenAI-compatible API at :8000/v1.  Open WebUI picks it up
  # automatically via OPENAI_API_BASE_URL=http://vllm:8000/v1 (set in .env).
  #
  # Model is loaded from HuggingFace Hub at startup — set VLLM_MODEL in .env.
  # Gated models (Llama, Mistral, …) require HUGGING_FACE_HUB_TOKEN.
  # HF cache is persisted in the hf_cache volume to avoid re-downloads.
  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: vllm-gb10:latest
    container_name: vllm
    restart: unless-stopped
    profiles: [vllm]
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.90}"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── Qdrant (optional external vector store) ─────────────────────────────────
  # Activate with:  docker compose --profile qdrant up -d
  # Then set VECTOR_DB=qdrant in .env and restart open-webui.
  #
  # To use an existing external Qdrant instance instead, leave this service
  # disabled and point QDRANT_URI at your instance.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [qdrant]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
  open_webui_data:
  qdrant_data:
  hf_cache:
