# Docker Compose — Open WebUI + vLLM + Docling
# Target: NVIDIA L40S (Ada Lovelace sm_89)
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed (nvidia-ctk runtime configure --runtime=docker)
#   - Docker Engine with NVIDIA runtime set as default, OR use `runtime: nvidia` below
#
# Quick start:
#   cp .env.example .env                      # adjust as needed
#   docker compose up -d

services:

  # ─── Open WebUI ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    environment:
      # vLLM as the sole inference backend (OpenAI-compatible)
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}

      # Docling as the document extraction engine
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001

      # Auth — set to false only for local/trusted networks
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-replace-this}

      # RAG / embedding — built-in sentence-transformers (CPU)
      # RAG_EMBEDDING_ENGINE left unset → Open WebUI uses built-in engine
      - RAG_EMBEDDING_ENGINE=
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-BAAI/bge-m3}

      # Reranker (hybrid search) — built-in cross-encoder (CPU)
      # Set ENABLE_RAG_HYBRID_SEARCH=true to activate
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-false}
      - RAG_RERANKING_ENGINE=
      - RAG_RERANKING_MODEL=${RAG_RERANKING_MODEL:-BAAI/bge-reranker-v2-m3}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_TOP_K_RERANKER=${RAG_TOP_K_RERANKER:-3}

      # Vector store — default: chroma (built-in, no extra service needed)
      # Set VECTOR_DB=qdrant and start with: docker compose --profile qdrant up -d
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - QDRANT_URI=${QDRANT_URI:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_PREFER_GRPC=${QDRANT_PREFER_GRPC:-false}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT_TIMEOUT=${QDRANT_TIMEOUT:-5}
    depends_on:
      vllm:
        condition: service_healthy
      docling:
        condition: service_healthy

  # ─── vLLM (Qwen3.5 — default) ────────────────────────────────────────────────
  # OpenAI-compatible inference server — sole LLM backend for Open WebUI.
  # Uses NVIDIA's official NGC vLLM container — supports L40S (sm_89) out of the box.
  # No custom build needed — pulled directly from NGC.
  #
  # Default model: Qwen/Qwen3.5-35B-A3B-FP8
  #   35B MoE (3B active params), FP8 — fits on a single L40S.
  #   Adjust VLLM_GPU_MEMORY_UTILIZATION downward if other services are also on GPU.
  #
  # To switch to Nemotron-3-Nano, use the override file instead:
  #   docker compose -f docker-compose.yml -f docker-compose.nemotron.yml up -d
  #
  # NOTE: NVFP4 quantization is Blackwell-exclusive and will not load on L40S.
  #       Set VLLM_MODEL in .env to a BF16 or FP8 checkpoint.
  vllm:
    image: nvcr.io/nvidia/vllm:${VLLM_NGC_TAG:-26.03-py3}
    container_name: vllm
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    command:
      - "vllm"
      - "serve"
      - "${VLLM_MODEL:-Qwen/Qwen3.5-35B-A3B-FP8}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.92}"
      - "--max-num-seqs"
      - "${VLLM_MAX_NUM_SEQS:-32}"
      - "--kv-cache-dtype"
      - "${VLLM_KV_CACHE_DTYPE:-fp8}"
      - "--trust-remote-code"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "${VLLM_TOOL_CALL_PARSER:-qwen3_coder}"
      - "--reasoning-parser"
      - "${VLLM_REASONING_PARSER:-qwen3}"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ─── Docling ─────────────────────────────────────────────────────────────────
  # Document extraction + OCR.
  docling:
    image: quay.io/docling-project/docling-serve-cu128:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "${DOCLING_PORT:-5001}:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
      # All PDFs treated as image-based — OCR every page regardless of text layer
      - DOCLING_SERVE_PIPELINE_OPTIONS__DO_OCR=true
      # Increase for large/complex documents
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
      # workers=1 is enforced via CLI flag in Dockerfile CMD (not this env var)
      # Thread tuning — adjust to available CPU cores
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-8}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-8}
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=${DOCLING_WORKERS:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ─── Qdrant (optional external vector store) ─────────────────────────────────
  # Activate with:  docker compose --profile qdrant up -d
  # Then set VECTOR_DB=qdrant in .env and restart open-webui.
  #
  # To use an existing external Qdrant instance instead, leave this service
  # disabled and point QDRANT_URI at your instance.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [qdrant]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  open_webui_data:
  qdrant_data:
