# Docker Compose — Open WebUI + vLLM + Docling + Infinity
# Target: NVIDIA DGX Spark (GB10 / Blackwell sm_121)
#
# Prerequisites:
#   - NVIDIA Container Toolkit installed (nvidia-ctk runtime configure --runtime=docker)
#   - Docker Engine with NVIDIA runtime set as default, OR use `runtime: nvidia` below
#
# Quick start:
#   cp .env.example .env                      # adjust as needed
#   docker compose build docling vllm embedder  # build GB10-compatible images
#   docker compose up -d

services:

  # ─── Open WebUI ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      # vLLM as the sole inference backend (OpenAI-compatible)
      - OPENAI_API_BASE_URL=http://vllm:8000/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY:-EMPTY}

      # Docling as the document extraction engine
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001

      # Auth — set to false only for local/trusted networks
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme-replace-this}

      # RAG / embedding — Infinity embedder replaces Ollama
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-BAAI/bge-m3}
      - RAG_OPENAI_API_BASE_URL=http://embedder:7997/v1
      - RAG_OPENAI_API_KEY=${RAG_OPENAI_API_KEY:-EMPTY}
      - RAG_OPENAI_BATCH_SIZE=${RAG_OPENAI_BATCH_SIZE:-32}

      # Reranker (hybrid search)
      # Default: disabled. To use the dedicated GPU reranker:
      #   set ENABLE_RAG_HYBRID_SEARCH=true, RAG_RERANKING_ENGINE=external
      #   and start with --profile reranker
      - ENABLE_RAG_HYBRID_SEARCH=${ENABLE_RAG_HYBRID_SEARCH:-false}
      - RAG_RERANKING_ENGINE=${RAG_RERANKING_ENGINE:-}
      - RAG_RERANKING_MODEL=${RAG_RERANKING_MODEL:-}
      - RAG_EXTERNAL_RERANKER_URL=${RAG_EXTERNAL_RERANKER_URL:-http://reranker:7998/rerank}
      - RAG_EXTERNAL_RERANKER_API_KEY=${RAG_EXTERNAL_RERANKER_API_KEY:-EMPTY}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_TOP_K_RERANKER=${RAG_TOP_K_RERANKER:-3}

      # Vector store — default: chroma (built-in, no extra service needed)
      # Set VECTOR_DB=qdrant and start with: docker compose --profile qdrant up -d
      - VECTOR_DB=${VECTOR_DB:-chroma}
      - QDRANT_URI=${QDRANT_URI:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_PREFER_GRPC=${QDRANT_PREFER_GRPC:-false}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - QDRANT_TIMEOUT=${QDRANT_TIMEOUT:-}
    depends_on:
      vllm:
        condition: service_healthy
      embedder:
        condition: service_healthy
      docling:
        condition: service_healthy

  # ─── vLLM ────────────────────────────────────────────────────────────────────
  # OpenAI-compatible inference server — sole LLM backend for Open WebUI.
  # Uses NVIDIA's official NGC vLLM container (CUDA 13.x, native sm_121 support).
  # No custom build needed — pulled directly from NGC.
  #
  # Model is loaded from HuggingFace Hub at startup — set VLLM_MODEL in .env.
  # Gated models (Llama, Mistral, …) require HUGGING_FACE_HUB_TOKEN.
  vllm:
    image: nvcr.io/nvidia/vllm:${VLLM_NGC_TAG:-26.02-py3}
    container_name: vllm
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    command:
      - "vllm"
      - "serve"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--tensor-parallel-size"
      - "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-8192}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.55}"
      - "--trust-remote-code"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── Embedder ────────────────────────────────────────────────────────────────
  # GPU embedding server (Infinity) — replaces Ollama's embedding function.
  # Exposes an OpenAI-compatible /v1/embeddings endpoint.
  # Default model: BAAI/bge-m3  (multilingual, 1024-dim)
  embedder:
    build:
      context: .
      dockerfile: Dockerfile.infinity
    image: infinity-gb10:latest
    container_name: embedder
    restart: unless-stopped
    ports:
      - "${EMBEDDER_PORT:-7997}:7997"
    volumes:
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    command:
      - "--model-id"
      - "${EMBEDDER_MODEL:-BAAI/bge-m3}"
      - "--port"
      - "7997"
      - "--host"
      - "0.0.0.0"
      - "--batch-size"
      - "${EMBEDDER_BATCH_SIZE:-32}"
      - "--device"
      - "cuda"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7997/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─── Docling ─────────────────────────────────────────────────────────────────
  # Document extraction + OCR. Built on NGC PyTorch 26.01 for sm_121 support.
  # If you want to try the upstream image first (may fail on GB10):
  #   image: quay.io/docling-project/docling-serve-cu128:latest
  docling:
    build:
      context: .
      dockerfile: Dockerfile.docling
    image: docling-serve-gb10:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "${DOCLING_PORT:-5001}:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
      # All PDFs treated as image-based — OCR every page regardless of text layer
      - DOCLING_SERVE_PIPELINE_OPTIONS__DO_OCR=true
      # Increase for large/complex documents
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
      # workers=1 is enforced via CLI flag in Dockerfile CMD (not this env var)
      # Thread tuning for GB10 (Grace CPU has many cores — adjust to taste)
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-8}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-8}
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=${DOCLING_WORKERS:-2}
    # NGC PyTorch recommends ipc=host and raised ulimits to avoid SHMEM issues
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ─── Reranker (optional GPU reranking server) ─────────────────────────────────
  # Activate with:  docker compose --profile reranker up -d
  # Then set ENABLE_RAG_HYBRID_SEARCH=true and RAG_RERANKING_ENGINE=external
  # in .env and restart open-webui.
  #
  # Exposes a Cohere-compatible /rerank endpoint.
  # Default model: BAAI/bge-reranker-v2-m3  (multilingual cross-encoder)
  reranker:
    build:
      context: .
      dockerfile: Dockerfile.infinity
    image: infinity-gb10:latest
    container_name: reranker
    restart: unless-stopped
    profiles: [reranker]
    ports:
      - "${RERANKER_PORT:-7998}:7998"
    volumes:
      - ${HF_CACHE_DIR:-./hf_cache}:/root/.cache/huggingface
    command:
      - "--model-id"
      - "${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
      - "--port"
      - "7998"
      - "--host"
      - "0.0.0.0"
      - "--batch-size"
      - "${RERANKER_BATCH_SIZE:-32}"
      - "--device"
      - "cuda"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7998/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ─── Qdrant (optional external vector store) ─────────────────────────────────
  # Activate with:  docker compose --profile qdrant up -d
  # Then set VECTOR_DB=qdrant in .env and restart open-webui.
  #
  # To use an existing external Qdrant instance instead, leave this service
  # disabled and point QDRANT_URI at your instance.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [qdrant]
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  open_webui_data:
  qdrant_data:
